<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="network"></canvas>
  
  <div class="nav-back" onclick="window.location.href='index.html'">← Menu</div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">◐</button>
  <div class="favorite-badge" onclick="toggleFavorite()">★ Pin</div>
  
  <div class="calculator">
    <div class="preview" id="preview"></div>
    <input type="text" id="display" oninput="updatePreview()" onfocus="this.setSelectionRange(this.value.length, this.value.length)">
    <div class="history-toggle" onclick="toggleHistory()">📜 History</div>
    
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button onclick="appendValue('/')">/</button>
      <button onclick="appendValue('*')">*</button>
      <button class="backspace" onclick="backspace()">⌫</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('+')">+</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('-')">-</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
    </div>
  </div>

  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <h3>History</h3>
      <button onclick="clearHistory(); renderHistory();">Clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="shortcut-hint">Ctrl+C: Copy | Ctrl+H: History | Ctrl+F: Pin</div>

  <script>
    const CALCULATOR_NAME = 'basic';
  </script>
  <script src="shared.js"></script>
  <script src="basic.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      renderHistory();
      const fav = getFavCalculator();
      if (fav === 'Basic') document.querySelector('.favorite-badge').textContent = '★ Pinned';
    });
  </script>
</body>
</html>
