<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="network"></canvas>
  
  <div class="nav-back" onclick="window.location.href='index.html'">← Menu</div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">◐</button>
  <div class="favorite-badge" onclick="toggleFavorite()">★ Pin</div>
  
  <div class="converter">
    <div class="converter-tabs">
      <button class="tab active" onclick="switchTab('length')">Length</button>
      <button class="tab" onclick="switchTab('weight')">Weight</button>
      <button class="tab" onclick="switchTab('temp')">Temp</button>
      <button class="tab" onclick="switchTab('area')">Area</button>
      <button class="tab" onclick="switchTab('volume')">Volume</button>
      <button class="tab" onclick="switchTab('speed')">Speed</button>
      <button class="tab" onclick="switchTab('fuel')">Fuel</button>
      <button class="tab" onclick="switchTab('data')">Data</button>
      <button class="tab" onclick="switchTab('cooking')">Cook</button>
      <button class="tab" onclick="switchTab('pressure')">Press</button>
      <button class="tab" onclick="switchTab('energy')">Energy</button>
    </div>
    
    <div class="converter-inputs">
      <div class="converter-field">
        <input type="number" id="fromValue" class="no-shortcut" placeholder="Enter value" oninput="convert()">
        <select id="fromUnit" class="no-shortcut" onchange="convert()"></select>
      </div>
      <div class="converter-equals">=</div>
      <div class="converter-field">
        <input type="number" id="toValue" class="no-shortcut" placeholder="Result" readonly onclick="copyToClipboard(this.value)">
        <select id="toUnit" class="no-shortcut" onchange="convert()"></select>
      </div>
    </div>
    
    <div class="converter-formulas" id="formulas"></div>
    
    <button class="swap-btn" onclick="swapUnits()">⇅ Swap</button>
  </div>

  <div class="shortcut-hint">Ctrl+C: Copy | Ctrl+F: Pin | 1-0: Switch tab</div>

  <script>
    const CALCULATOR_NAME = 'converter';
  </script>
  <script src="shared.js"></script>
  <script src="converter.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const fav = getFavCalculator();
      if (fav === 'Converter') document.querySelector('.favorite-badge').textContent = '★ Pinned';
    });
  </script>
</body>
</html>
