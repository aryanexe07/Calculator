<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="network"></canvas>
  
  <div class="nav-back" onclick="window.location.href='index.html'">← Menu</div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">◐</button>
  <div class="favorite-badge" onclick="toggleFavorite()">★ Pin</div>
  
  <div class="base-converter">
    <div class="base-display">
      <input type="text" id="inputValue" class="no-shortcut" placeholder="Enter number" oninput="convertBase()">
      <select id="fromBase" class="no-shortcut" onchange="convertBase()">
        <option value="2">Binary (2)</option>
        <option value="8">Octal (8)</option>
        <option value="10" selected>Decimal (10)</option>
        <option value="16">Hexadecimal (16)</option>
      </select>
    </div>
    
    <div class="base-results">
      <div class="base-result">
        <label>Binary</label>
        <input type="text" id="binResult" readonly onclick="copyToClipboard(this.value)">
        <span class="base-label">2</span>
      </div>
      <div class="base-result">
        <label>Octal</label>
        <input type="text" id="octResult" readonly onclick="copyToClipboard(this.value)">
        <span class="base-label">8</span>
      </div>
      <div class="base-result">
        <label>Decimal</label>
        <input type="text" id="decResult" readonly onclick="copyToClipboard(this.value)">
        <span class="base-label">10</span>
      </div>
      <div class="base-result">
        <label>Hexadecimal</label>
        <input type="text" id="hexResult" readonly onclick="copyToClipboard(this.value)">
        <span class="base-label">16</span>
      </div>
    </div>
    
    <div class="base-info">
      <p id="baseInfo">Enter a number in any base to see conversions</p>
    </div>
  </div>

  <div class="shortcut-hint">Ctrl+C: Copy | Ctrl+F: Pin</div>

  <script>
    const CALCULATOR_NAME = 'base';
  </script>
  <script src="shared.js"></script>
  <script src="base.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const fav = getFavCalculator();
      if (fav === 'Base') document.querySelector('.favorite-badge').textContent = '★ Pinned';
    });
  </script>
</body>
</html>
